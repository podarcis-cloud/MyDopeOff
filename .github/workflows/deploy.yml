name: Déployer MyDope Off

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Décompresser l'archive du site
        run: |
          mkdir -p _site
          unzip -o mydopeoff-revise.zip -d _site
          if [ ! -f _site/index.html ]; then
            inner=$(find _site -maxdepth 2 -name index.html | head -n1)
            if [ -n "$inner" ]; then cp -r "$(dirname "$inner")"/* _site/; fi
          fi

      - name: Configurer Pages
        uses: actions/configure-pages@v5

      - name: Téléverser le site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Déployer
        id: deployment
        uses: actions/deploy-pages@v4
