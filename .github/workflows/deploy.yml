name: Déployer MyDope Off

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Décompresser l'archive du site
        run: |
          mkdir -p _site
          unzip -o mydopeoff-revise.zip -d _site
          
          # Chercher index.html partout (plus profond)
          inner=$(find _site -name "index.html" -type f | head -n1)
          if [ -n "$inner" ]; then
            dir=$(dirname "$inner")
            if [ "$dir" != "_site" ]; then
              cp -r "$dir"/* _site/ 2>/dev/null || true
              find _site -maxdepth 1 -type d ! -name "_site" ! -name "." -exec rm -rf {} + 2>/dev/null || true
            fi
          fi

      - name: Configurer Pages
        uses: actions/configure-pages@v5

      - name: Téléverser le site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Déployer
        id: deployment
        uses: actions/deploy-pages@v4
